services:
  - type: web
    name: quizsphere-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --worker-class eventlet -w 1 app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: ALLOWED_ORIGINS
        value: https://your-frontend-url.vercel.app
      - key: DATABASE_URL
        value: sqlite:///instance/quizsphere.db # Note: SQLite will reset on redeploy. Use Postgres for persistence.
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false # Set this in Render Dashboard
